name: "✨ 機能リクエスト"
description: "新機能や改善を提案する"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        機能リクエストありがとうございます！

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題
      description: "この機能が必要な理由・背景を教えてください"
      placeholder: "例: 法事（一周忌、三回忌等）に対応していないため、法事の相場やマナーを聞かれると対応できない"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: "どのような機能があれば解決しますか？"
      placeholder: |
        例:
        - SKILL.md に法事イベントの分類を追加
        - references/etiquette.md に法事セクションを追加
        - amount_validator.py に法事の相場を追加
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: カテゴリ
      options:
        - "新しいイベント対応"
        - "既存イベントの改善"
        - "スクリプトの機能追加"
        - "テンプレートの追加・改善"
        - "ドキュメントの改善"
        - "その他"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: "検討した代替案があれば記載してください"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 補足情報
      description: "参考資料、スクリーンショット、その他の情報があれば記載してください"
    validations:
      required: false
